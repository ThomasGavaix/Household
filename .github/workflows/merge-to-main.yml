name: Merge chore-pwa into main and set default branch

on:
  push:
    branches:
      - copilot/merge-chore-pwa-into-main

jobs:
  merge-and-set-default:
    name: Merge into main & set default branch
    runs-on: ubuntu-latest
    permissions:
      contents: write
      administration: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Merge copilot/merge-chore-pwa-into-main into main
        run: |
          git fetch origin main
          git checkout main
          git merge --ff-only origin/copilot/merge-chore-pwa-into-main \
            || git merge origin/copilot/merge-chore-pwa-into-main \
               -m "feat: merge chore-pwa into main"
          git push origin main

      - name: Set main as default branch
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            await github.rest.repos.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              default_branch: 'main',
            });
            console.log('Default branch set to main');
